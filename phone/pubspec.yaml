name: phone
description: Hellovia Translate — real-time AI translation (Flutter port of mobile).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^2.0.3+1      # Socket.IO client (replaces socket.io-client)
  shared_preferences: ^2.2.3      # local prefs (replaces AsyncStorage)
  image_picker: ^1.1.2            # avatar picker (replaces expo-image-picker)
  record: ^6.2.1                  # mic recording (replaces expo-audio)
  path_provider: ^2.1.3           # temp dir for recordings
  flutter_web_auth_2: ^5.0.0      # Google OAuth via web session (replaces expo-web-browser)
  audioplayers: ^6.7.1
  reactive_forms: ^18.2.2

dev_dependencies:
  flutter_lints: ^4.0.0

dependency_overrides:
  flutter_web_auth_2:
    path: vendor/flutter_web_auth_2
  record_android:
    path: vendor/record_android

flutter:
  uses-material-design: true
  assets:
    - assets/locales/
