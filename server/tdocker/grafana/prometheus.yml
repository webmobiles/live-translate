global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:9464

  - job_name: live-translate-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:4000
          # If the Node server runs as a service on this Docker network, use:
          # - server:4000

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # Blackbox Exporter — probes the server health endpoints over HTTP.
  # probe_success=1 means healthy, probe_success=0 means down.
  #
  # Option A (local dev — server runs on Mac with npm run dev):
  #   host.docker.internal resolves to the Mac host from inside Colima/Docker.
  #
  # Option B (production — server runs inside Docker on same network):
  #   Replace the targets below with:
  #     - http://server:4000/health/live
  #     - http://server:4000/health/ready
  #     - http://server:4000/health
  #   No IP needed — Docker internal DNS resolves "server" automatically.
  - job_name: live-translate-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:4000/health/live   # liveness
          - http://host.docker.internal:4000/health/ready  # readiness
          - http://host.docker.internal:4000/health        # full status
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
