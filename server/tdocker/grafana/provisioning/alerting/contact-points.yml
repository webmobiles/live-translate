apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-live-translate-alerts
    receivers:
      - uid: slack_live_translate_alerts
        type: slack
        settings:
          url: $SLACK_WEBHOOK_URL
          recipient: $GRAFANA_SLACK_ALERT_CHANNEL
          username: Grafana
          title: '{{ template "slack.default.title" . }}'
          text: '{{ template "slack.default.text" . }}'
        disableResolveMessage: true
