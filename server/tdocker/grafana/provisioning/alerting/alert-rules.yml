apiVersion: 1

groups:
  - orgId: 1
    name: live-translate-health
    folder: Live Translate
    interval: 1m
    rules:

      - uid: live_translate_liveness
        title: Server down — liveness probe failed
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'probe_success{instance=~".*health/live"}'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 120
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 0s
        annotations:
          summary: 🔴 Live Translate server is DOWN
          description: |
            The liveness probe failed — the server process is not responding.
            Check: `http://localhost:4000/health/live`
        labels:
          service: live-translate-server
          severity: P1
        isPaused: false

      - uid: live_translate_readiness
        title: Server degraded — readiness probe failed
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'probe_success{instance=~".*health/ready"}'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 120
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 0s
        annotations:
          summary: 🟠 Live Translate dependencies unavailable
          description: |
            The readiness probe failed — one or more dependencies (DB, queue, Inngest) are down.
            Check: `http://localhost:4000/health/ready`
        labels:
          service: live-translate-server
          severity: P1
        isPaused: false
