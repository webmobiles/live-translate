
# ── Live Translate — local dev infrastructure ──────────────────────────────
#
#  Services:
#    redpanda      → Kafka-compatible message broker (pub/sub between servers)
#    redpanda-console → Redpanda web UI  (http://localhost:8080)
#    scylla        → Distributed database (permanent chat history)
#    tidb/tikv/pd  → Optional TiKV-backed database profile
#    inngest       → AI workflow orchestrator (http://localhost:8288)
#
#  Start:
#    docker compose -f tdocker/docker-compose.yml up -d
#
#  Stop:
#    docker compose -f tdocker/docker-compose.yml down
#
#  Wipe all data:
#    docker compose -f docker/docker-compose.yml down -v
# ──────────────────────────────────────────────────────────────────────────

networks:
  live-translate:
    driver: bridge

volumes:
  redpanda-data:
  scylla-data:
  pd-data:
  tikv-data:

services:

  # ── Redpanda ─────────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: live-translate-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"   # Kafka API (external) — use this in your .env
      - "18082:18082"   # Pandaproxy REST
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - live-translate
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda Console — visual UI to inspect topics and messages
  redpanda-console:
    image: redpandadata/console:latest
    container_name: live-translate-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /tmp/config.yml << EOF
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        EOF
        /app/console
    ports:
      - "8080:8080"     # Web UI → http://localhost:8080
    networks:
      - live-translate

  # ── ScyllaDB ──────────────────────────────────────────────────────────────
  scylla:
    image: scylladb/scylla:6.2
    container_name: live-translate-scylla
    command: --smp=1 --memory=512M --overprovisioned=1 --developer-mode=1
    ports:
      - "9042:9042"     # CQL native transport — use this in your .env
      - "9160:9160"     # Thrift (legacy, rarely needed)
      - "10000:10000"   # REST API
    volumes:
      - scylla-data:/var/lib/scylla
    networks:
      - live-translate
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s  # ScyllaDB takes ~30s to boot

  # ScyllaDB init — creates keyspace and tables on first start
  scylla-init:
    image: scylladb/scylla:6.2
    container_name: live-translate-scylla-init
    depends_on:
      scylla:
        condition: service_healthy
    networks:
      - live-translate
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cqlsh scylla -e "CREATE KEYSPACE IF NOT EXISTS live_translate WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
        cqlsh scylla -e "CREATE TABLE IF NOT EXISTS live_translate.rooms (id uuid PRIMARY KEY, code text, name text, created_at bigint);"
        cqlsh scylla -e "CREATE TABLE IF NOT EXISTS live_translate.rooms_by_code (code text PRIMARY KEY, room_id uuid);"
        cqlsh scylla -e "CREATE TABLE IF NOT EXISTS live_translate.messages (room_id uuid, timestamp bigint, id uuid, sender text, sender_lang text, original text, translations map<text, text>, is_audio boolean, PRIMARY KEY (room_id, timestamp, id)) WITH CLUSTERING ORDER BY (timestamp DESC, id ASC);"
        echo '[scylla-init] keyspace and tables ready'

  # ── TiKV via TiDB SQL layer ──────────────────────────────────────────────
  # Start with:
  #   docker compose -f tdocker/docker-compose.yml --profile tikv up -d pd tikv tidb
  pd:
    image: pingcap/pd:v8.5.0
    container_name: live-translate-pd
    profiles: ["tikv"]
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --log-file=
    ports:
      - "2379:2379"
    volumes:
      - pd-data:/data/pd
    networks:
      - live-translate

  tikv:
    image: pingcap/tikv:v8.5.0
    container_name: live-translate-tikv
    profiles: ["tikv"]
    depends_on:
      - pd
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --pd=pd:2379
      - --data-dir=/data/tikv
      - --log-file=
    ports:
      - "20160:20160"
      - "20180:20180"
    volumes:
      - tikv-data:/data/tikv
    networks:
      - live-translate

  tidb:
    image: pingcap/tidb:v8.5.0
    container_name: live-translate-tidb
    profiles: ["tikv"]
    depends_on:
      - pd
      - tikv
    command:
      - --store=tikv
      - --path=pd:2379
      - --host=0.0.0.0
      - --advertise-address=tidb
      - --log-file=
    ports:
      - "14000:4000"   # TiDB SQL/MySQL protocol; 4000 is used by the Node server
      - "10080:10080"  # TiDB status
    networks:
      - live-translate

  # ── Inngest ───────────────────────────────────────────────────────────────
  inngest:
    image: inngest/inngest:latest
    container_name: live-translate-inngest
    command: inngest dev -u http://host.docker.internal:4000/api/inngest --no-poll
    ports:
      - "8288:8288"     # Dev UI → http://localhost:8288
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Inngest reach your local server
    networks:
      - live-translate
