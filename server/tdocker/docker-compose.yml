
# ── Live Translate — local dev infrastructure ──────────────────────────────
#
#  Services:
#    nats          → Default message broker (pub/sub between servers)
#    redpanda      → Optional Kafka-compatible message broker
#    redpanda-console → Redpanda web UI  (http://localhost:8080)
#    scylla        → Distributed database (permanent chat history)
#    tidb/tikv/pd  → Optional TiKV-backed database profile
#    surrealdb     → Optional SurrealDB database profile
#    dragonfly     → Optional Redis-compatible Socket.IO adapter
#    valkey        → Optional Redis-compatible Socket.IO adapter
#    inngest       → AI workflow orchestrator (http://localhost:8288)
#    grafana/loki/tempo/prometheus → Optional OSS observability stack
#
#  Start:
#    docker compose -f tdocker/docker-compose.yml up -d
#
#  Stop:
#    docker compose -f tdocker/docker-compose.yml down
#
#  Wipe all data:
#    docker compose -f docker/docker-compose.yml down -v
# ──────────────────────────────────────────────────────────────────────────

networks:
  live-translate:
    driver: bridge

# Data lives on the host at /var/myapps/livetranslate — never lost on `docker compose down`
# To create the directories: sudo mkdir -p /var/myapps/livetranslate/{nats,redpanda,scylla,pd,tikv,surrealdb,dragonfly,valkey,openobserve,grafana,loki,tempo,prometheus} && sudo chown -R $(whoami) /var/myapps/livetranslate

services:

  # ── NATS ─────────────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: live-translate-nats
    command:
      - -js
      - -sd
      - /data
      - -m
      - "8222"
    ports:
      - "4222:4222"   # NATS client port
      - "8222:8222"   # Monitoring UI/API → http://localhost:8222
    volumes:
      - /var/myapps/livetranslate/nats:/data
    networks:
      - live-translate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redpanda ─────────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: live-translate-redpanda
    profiles: ["redpanda"]
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"   # Kafka API (external) — use this in your .env
      - "18082:18082"   # Pandaproxy REST
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    volumes:
      - /var/myapps/livetranslate/redpanda:/var/lib/redpanda/data
    networks:
      - live-translate
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda Console — visual UI to inspect topics and messages
  redpanda-console:
    image: redpandadata/console:latest
    container_name: live-translate-redpanda-console
    profiles: ["redpanda"]
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /tmp/config.yml << EOF
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        EOF
        /app/console
    ports:
      - "8080:8080"     # Web UI → http://localhost:8080
    networks:
      - live-translate

  # ── ScyllaDB ──────────────────────────────────────────────────────────────
  scylla:
    image: scylladb/scylla:6.2
    container_name: live-translate-scylla
    command: --smp=1 --memory=512M --overprovisioned=1 --developer-mode=1
    ports:
      - "9042:9042"     # CQL native transport — use this in your .env
      - "9160:9160"     # Thrift (legacy, rarely needed)
      - "10000:10000"   # REST API
    volumes:
      - /var/myapps/livetranslate/scylla:/var/lib/scylla
    networks:
      - live-translate
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s  # ScyllaDB takes ~30s to boot

  # ScyllaDB init — creates keyspace and tables on first start
  scylla-init:
    image: scylladb/scylla:6.2
    container_name: live-translate-scylla-init
    depends_on:
      scylla:
        condition: service_healthy
    networks:
      - live-translate
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cqlsh scylla -e "CREATE KEYSPACE IF NOT EXISTS live_translate WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
        cqlsh scylla -e "CREATE TABLE IF NOT EXISTS live_translate.rooms (id uuid PRIMARY KEY, code text, name text, config text, created_at bigint);"
        cqlsh scylla -e "CREATE TABLE IF NOT EXISTS live_translate.rooms_by_code (code text PRIMARY KEY, room_id uuid);"
        cqlsh scylla -e "CREATE TABLE IF NOT EXISTS live_translate.messages (room_id uuid, timestamp bigint, id uuid, sender text, sender_lang text, original text, translations map<text, text>, is_audio boolean, PRIMARY KEY (room_id, timestamp, id)) WITH CLUSTERING ORDER BY (timestamp DESC, id ASC);"
        echo '[scylla-init] keyspace and tables ready'

  # ── TiKV via TiDB SQL layer ──────────────────────────────────────────────
  # Start with:
  #   docker compose -f tdocker/docker-compose.yml --profile tikv up -d pd tikv tidb
  pd:
    image: pingcap/pd:v8.5.0
    container_name: live-translate-pd
    profiles: ["tikv"]
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --log-file=
    ports:
      - "2379:2379"
    volumes:
      - /var/myapps/livetranslate/pd:/data/pd
    networks:
      - live-translate

  tikv:
    image: pingcap/tikv:v8.5.0
    container_name: live-translate-tikv
    profiles: ["tikv"]
    depends_on:
      - pd
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --pd=pd:2379
      - --data-dir=/data/tikv
      - --log-file=
    ports:
      - "20160:20160"
      - "20180:20180"
    volumes:
      - /var/myapps/livetranslate/tikv:/data/tikv
    networks:
      - live-translate

  tidb:
    image: pingcap/tidb:v8.5.0
    container_name: live-translate-tidb
    profiles: ["tikv"]
    depends_on:
      - pd
      - tikv
    command:
      - --store=tikv
      - --path=pd:2379
      - --host=0.0.0.0
      - --advertise-address=tidb
      - --log-file=
    ports:
      - "14000:4000"   # TiDB SQL/MySQL protocol; 4000 is used by the Node server
      - "10080:10080"  # TiDB status
    networks:
      - live-translate

  # ── SurrealDB ────────────────────────────────────────────────────────────
  # Start with:
  #   docker compose -f tdocker/docker-compose.yml --profile surreal up -d surrealdb
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: live-translate-surrealdb
    profiles: ["surreal"]
    command:
      - start
      - --user
      - root
      - --pass
      - root
      - rocksdb:/data/live-translate.db
    ports:
      - "8000:8000"
    volumes:
      - /var/myapps/livetranslate/surrealdb:/data
    networks:
      - live-translate

  # ── Realtime adapters: Dragonfly / Valkey ────────────────────────────────
  # Dragonfly:
  #   docker compose -f tdocker/docker-compose.yml --profile dragonfly up -d dragonfly
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: live-translate-dragonfly
    command:
      - --logtostderr
      - --proactor_threads=1
      - --maxmemory=256mb
    ports:
      - "6379:6379"
    volumes:
      - /var/myapps/livetranslate/dragonfly:/data
    networks:
      - live-translate

  # Valkey:
  #   docker compose -f tdocker/docker-compose.yml --profile valkey up -d valkey
  valkey:
    image: valkey/valkey:8
    container_name: live-translate-valkey
    profiles: ["valkey"]
    command:
      - valkey-server
      - --appendonly
      - "yes"
    ports:
      - "6380:6379"
    volumes:
      - /var/myapps/livetranslate/valkey:/data
    networks:
      - live-translate

  # ── Inngest ───────────────────────────────────────────────────────────────
  inngest:
    image: inngest/inngest:latest
    container_name: live-translate-inngest
    command: inngest dev -u http://host.docker.internal:4000/api/inngest --no-poll
    ports:
      - "8288:8288"     # Dev UI → http://localhost:8288
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Inngest reach your local server
    networks:
      - live-translate

  # ── OpenObserve ──────────────────────────────────────────────────────────
  # Start with:
  #   docker compose -f tdocker/docker-compose.yml --profile observability up -d openobserve
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: live-translate-openobserve
    profiles: ["observability"]
    environment:
      ZO_ROOT_USER_EMAIL: root@example.com
      ZO_ROOT_USER_PASSWORD: Complexpass#123
      ZO_DATA_DIR: /data
    ports:
      - "5080:5080"   # UI and ingestion API → http://localhost:5080
    volumes:
      - /var/myapps/livetranslate/openobserve:/data
    networks:
      - live-translate

  # ── Grafana OSS observability stack ──────────────────────────────────────
  # Start with:
  #   docker compose -f tdocker/docker-compose.yml --profile grafana up -d grafana loki tempo prometheus otel-collector
  grafana:
    image: grafana/grafana:latest
    container_name: live-translate-grafana
    profiles: ["grafana"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      GRAFANA_SLACK_ALERT_CHANNEL: ${GRAFANA_SLACK_ALERT_CHANNEL:-live-translate-alerts}
    ports:
      - "3001:3000"   # UI → http://localhost:3001
    volumes:
      - /var/myapps/livetranslate/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - live-translate

  loki:
    image: grafana/loki:latest
    container_name: live-translate-loki
    profiles: ["grafana"]
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"   # Loki API
    volumes:
      - /var/myapps/livetranslate/loki:/loki
      - ./grafana/loki.yml:/etc/loki/local-config.yml:ro
    networks:
      - live-translate

  tempo:
    image: grafana/tempo:latest
    container_name: live-translate-tempo
    profiles: ["grafana"]
    command: -config.file=/etc/tempo.yml
    ports:
      - "3200:3200"   # Tempo API
    volumes:
      - /var/myapps/livetranslate/tempo:/tmp/tempo
      - ./grafana/tempo.yml:/etc/tempo.yml:ro
    networks:
      - live-translate

  prometheus:
    image: prom/prometheus:latest
    container_name: live-translate-prometheus
    profiles: ["grafana"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"   # Prometheus UI/API
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/myapps/livetranslate/prometheus:/prometheus
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - live-translate

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: live-translate-cadvisor
    profiles: ["grafana"]
    ports:
      - "8081:8080"   # cAdvisor UI/metrics → http://localhost:8081
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - live-translate

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: live-translate-blackbox
    profiles: ["grafana"]
    ports:
      - "9115:9115"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - live-translate

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: live-translate-otel-collector
    profiles: ["grafana"]
    command: ["--config=/etc/otel-collector.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./grafana/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      - tempo
    networks:
      - live-translate
