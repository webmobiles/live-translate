name: live-translate-prod

x-node-service: &node-service
  image: node:22-bookworm-slim
  working_dir: /app
  env_file:
    - ../.env
  environment: &node-environment
    NODE_ENV: production
    PORT: "4000"
    # Public URLs from a single PUBLIC_HOST var (set in server/.env)
    FRONTEND_URL: https://${PUBLIC_HOST:?Set PUBLIC_HOST in server/.env}
    GOOGLE_CALLBACK_URL: https://${PUBLIC_HOST:?Set PUBLIC_HOST in server/.env}/auth/google/callback
    DB_PROVIDER_AUTH: postgres
    DB_PROVIDER_ROOM: postgres
    NATS_SERVERS: nats://nats:4222
    # Shared Redpanda broker lives in peleserver/docker/kafka (hostname: redpanda).
    REDPANDA_BROKERS: redpanda:9092
    DRAGONFLY_URL: redis://dragonfly:6379
    AUDIOS_PATH: /app/data/audios
    PROFILE_IMAGES_DIR: /app/data/images/profiles
    INNGEST: "off"
    INNGEST_DEV: "0"
    LOG_PRETTY: "false"
    LOKI_URL: http://loki:3100/loki/api/v1/push
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  restart: unless-stopped
  init: true
  networks:
    - pelemobil

services:
  api:
    <<: *node-service
    container_name: live-translate-api
    command: ["node", "server.js"]
    profiles: ["prod"]
    networks:
      pelemobil:
        aliases:
          - live-translate-api
    # Fronted by the shared pelemobil nginx; reachable in-network as live-translate-api:4000.
    # Shared postgres + redpanda live in separate composes, so they can't be depended on here;
    # the server's startup health-check (STARTUP_HEALTHCHECK_RETRIES) waits for them instead.
    expose:
      - "4000"
    volumes:
      - ../bundle:/app:ro
      - /var/workfolder/livetranslate/audios:/app/data/audios
      - /var/workfolder/livetranslate/profile-images:/app/data/images/profiles
    depends_on:
      nats:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  email-worker:
    <<: *node-service
    container_name: live-translate-email-worker
    command: ["node", "emailWorker.js"]
    profiles: ["prod"]
    volumes:
      - ../bundle:/app:ro

  nats:
    image: nats:2.10-alpine
    container_name: live-translate-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      # NATS client port for host-side dev server: NATS_SERVERS=nats://localhost:4222
      - "127.0.0.1:4222:4222"
      # Optional: NATS monitoring endpoint for local debugging.
      - "127.0.0.1:8222:8222"
    volumes:
      - ../data/nats:/data
    restart: unless-stopped
    networks:
      - pelemobil
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: live-translate-dragonfly
    command: ["--logtostderr", "--proactor_threads=1", "--maxmemory=256mb"]
    ports:
      # Redis-compatible Dragonfly port for host-side dev server: DRAGONFLY_URL=redis://localhost:6379
      - "127.0.0.1:6379:6379"
    volumes:
      - ../data/dragonfly:/data
    restart: unless-stopped
    networks:
      - pelemobil
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: live-translate-grafana
    profiles: ["grafana"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in server/.env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ../data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - tempo
      - prometheus
    restart: unless-stopped
    networks:
      - pelemobil

  loki:
    image: grafana/loki:latest
    container_name: live-translate-loki
    profiles: ["grafana"]
    command: ["-config.file=/etc/loki/local-config.yml", "-ingester.wal-disk-full-threshold=0", "-ingester.min-ready-duration=0s"]
    volumes:
      - ../data/loki:/loki
      - ./grafana/loki.yml:/etc/loki/local-config.yml:ro
    restart: unless-stopped
    networks:
      - pelemobil

  tempo:
    image: grafana/tempo:latest
    container_name: live-translate-tempo
    profiles: ["grafana"]
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ../data/tempo:/tmp/tempo
      - ./grafana/tempo.yml:/etc/tempo.yml:ro
    restart: unless-stopped
    networks:
      - pelemobil

  prometheus:
    image: prom/prometheus:latest
    container_name: live-translate-prometheus
    profiles: ["grafana"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus", "--web.enable-lifecycle"]
    volumes:
      - ../data/prometheus:/prometheus
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    networks:
      - pelemobil

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: live-translate-cadvisor
    profiles: ["grafana"]
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - pelemobil

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: live-translate-blackbox
    profiles: ["grafana"]
    restart: unless-stopped
    networks:
      - pelemobil

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: live-translate-otel-collector
    profiles: ["grafana"]
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./grafana/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      - tempo
    restart: unless-stopped
    networks:
      - pelemobil

networks:
  pelemobil:
    external: true
