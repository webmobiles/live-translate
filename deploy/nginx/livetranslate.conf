# live-translate nginx site for the shared pelemobil-nginx container.
#
# Copy to:
#   /var/workfolder/nginxconf/livetranslate.conf
#
# Expected container paths from peleserver nginx volumes:
#   /var/workfolder/builds/frontends/livetranslate -> /var/www/staticsites/livetranslate
#   /var/workfolder/letsencrypt                   -> /etc/letsencrypt
#
# The API container must be on the shared Docker network with alias:
#   live-translate-api:4000

map $http_upgrade $lt_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name livetranslate.hellovia.app;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name livetranslate.hellovia.app;

    ssl_certificate     /etc/letsencrypt/live/hellovia.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hellovia.app/privkey.pem;

    client_max_body_size 25m;

    root /var/www/staticsites/livetranslate;
    index index.html;

    location ~ ^/(api|auth|health|uploads|client|socket\.io)(/|$) {
        proxy_pass http://live-translate-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $lt_connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ~ ^/(internal|metrics)(/|$) {
        return 404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri /index.html;
    }
}
